name: Feature request
description: Suggest a new tool, capability, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The workflow or use case this would enable.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >-
        What new tool / behaviour would you like? Note which of the six tools
        (`publish_artifact`, `grant_access`, `revoke_access`, `list_artifacts`,
        `get_artifact`, `delete_artifact`) or which part of the GCS access model
        (publishing, per-object ACL sharing, listing) it touches.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing tools or workarounds you have tried.
    validations:
      required: false
